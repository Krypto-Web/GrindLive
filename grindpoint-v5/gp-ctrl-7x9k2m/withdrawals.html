      <a href="../index.html" class="navbar__logo">Grind<span class="logo-accent">point</span></a>
      <span class="admin-badge">Admin Panel</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span id="adminName" style="font-size:.82rem;color:var(--text-secondary);">Admin</span>
      <button onclick="signOut()" class="btn btn-secondary btn-sm">Sign Out</button>
    </div>
  </div>
</nav>
<div class="page-wrapper">
  <aside class="sidebar admin-sidebar">
    <nav class="sidebar__nav">
      <span class="sidebar__label">Overview</span>
      <a href="index.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="analytics.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a>
      <a href="fraud.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Fraud Detection</a>
      <span class="sidebar__label">Manage</span>
      <a href="users.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>All Users</a>
      <a href="task-submissions.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg>Task Submissions</a>
      <a href="withdrawals.html" class="sidebar__link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Withdrawals</a>
      <a href="tasks-admin.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg>Task Manager</a>
      <a href="announcements.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 17H2a3 3 0 000 6h20V17z"/></svg>Announcements</a>
      <a href="settings.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Settings</a>
    </nav>
  </aside>
  <main class="main-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1 class="page-title">Withdrawal Requests</h1>
        <p class="page-subtitle" id="wdSummary">Loading…</p>
      </div>
      <select id="statusFilter" class="form-control" style="width:160px;">
        <option value="pending" selected>⏳ Pending</option>
        <option value="approved">✅ Approved</option>
        <option value="rejected">❌ Rejected</option>
        <option value="all">All</option>
      </select>
    </div>
    <div class="stats-grid mb-6" id="wdStats">
      <div class="stat-card skeleton" style="height:110px;"></div>
      <div class="stat-card skeleton" style="height:110px;"></div>
      <div class="stat-card skeleton" style="height:110px;"></div>
    </div>
    <div class="table-wrapper">
      <table class="data-table">
        <thead><tr><th>User</th><th>Amount</th><th>Payment Details</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="wdBody"><tr><td colspan="6" style="text-align:center;padding:3rem;"><div class="skeleton" style="height:20px;width:200px;margin:0 auto;border-radius:8px;"></div></td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/main.js"></script>
<script>
let _all = [];

document.addEventListener("DOMContentLoaded", async () => {
  const auth = await requireAdmin();
  if (!auth) return;
  document.getElementById("adminName").textContent = auth.profile?.full_name || "Admin";
  await load();
});

async function load() {
  const sb = getSupabase();
  const { data, error } = await sb.from("withdrawal_requests")
    .select("*, profiles(full_name,email)")
    .order("created_at",{ascending:false});

  if (error) {
    document.getElementById("wdBody").innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--error);">${error.message}<br><small>Run supabase-fix.sql if table missing.</small></td></tr>`;
    document.getElementById("wdStats").innerHTML = "";
    return;
  }
  _all = data || [];

  const pend = _all.filter(w=>w.status==="pending");
  const appv = _all.filter(w=>w.status==="approved");
  document.getElementById("wdSummary").textContent = `${_all.length} total · ${pend.length} pending`;

  document.getElementById("wdStats").innerHTML = `
    <div class="stat-card" style="${pend.length>0?'border-color:rgba(239,68,68,.3);':''}">
      <div class="stat-card__label">Pending</div>
      <div class="stat-card__value" style="${pend.length>0?'color:var(--error);':''}">${pend.length}</div>
      <div class="stat-card__sub">${formatNaira(pend.reduce((s,w)=>s+(w.amount||0),0))} to pay</div>
    </div>
    <div class="stat-card stat-card--gold">
      <div class="stat-card__label">Approved</div>
      <div class="stat-card__value">${appv.length}</div>
      <div class="stat-card__sub">${formatNaira(appv.reduce((s,w)=>s+(w.amount||0),0))} paid</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">All Time</div>
      <div class="stat-card__value">${_all.length}</div>
      <div class="stat-card__sub">Total requests</div>
    </div>`;

  filterRender();
}

function filterRender() {
  const f = document.getElementById("statusFilter").value;
  const list = f==="all" ? _all : _all.filter(w=>w.status===f);
  const bm = {pending:"badge-gold",approved:"badge-success",rejected:"badge-error"};
  document.getElementById("wdBody").innerHTML = list.map(w=>`
    <tr>
      <td><div style="font-weight:600;font-size:.875rem;">${w.profiles?.full_name||"Unknown"}</div><div style="font-size:.73rem;color:var(--text-muted);">${w.profiles?.email||"—"}</div></td>
      <td><strong style="color:var(--gold-500);">${formatNaira(w.amount)}</strong></td>
      <td><div style="font-size:.82rem;font-weight:600;">${w.bank_name||"—"}</div><div style="font-size:.75rem;color:var(--text-muted);font-family:monospace;">${w.account_number||"—"}</div><div style="font-size:.75rem;color:var(--text-muted);">${w.account_name||"—"}</div></td>
      <td style="font-size:.78rem;color:var(--text-muted);">${w.created_at?new Date(w.created_at).toLocaleDateString("en-NG"):"—"}</td>
      <td><span class="badge ${bm[w.status]||"badge-muted"}">${w.status}</span></td>
      <td>${w.status==="pending"?`<div style="display:flex;gap:.4rem;">
        <button class="btn btn-sm" style="background:var(--success-bg);color:var(--success);border:1px solid rgba(34,197,94,.3);" onclick="process('${w.id}','approved')">✓ Approve</button>
        <button class="btn btn-danger btn-sm" onclick="process('${w.id}','rejected')">✗ Reject</button>
      </div>`:`<span style="font-size:.78rem;color:var(--text-muted);">—</span>`}</td>
    </tr>`).join("") || `<tr><td colspan="6" style="text-align:center;padding:3rem;color:var(--text-muted);">No requests found.</td></tr>`;
}

document.getElementById("statusFilter").addEventListener("change", filterRender);

async function process(id, status) {
  const label = status === "approved" ? "Approve" : "Reject";
  if (!confirm(`${label} this withdrawal? This action will be recorded.`)) return;

  const sb  = getSupabase();
  const req = _all.find(w => w.id === id);
  if (!req) return;

  // Update the withdrawal request status
  const { error } = await sb
    .from("withdrawal_requests")
    .update({ status, processed_at: new Date().toISOString() })
    .eq("id", id);

  if (error) {
    if (error.code === "42501" || error.message?.includes("RLS") || error.message?.includes("policy")) {
      showToast("❌ Permission denied — run supabase-admin-rls.sql in Supabase SQL Editor.", "error", 8000);
    } else {
      showToast("Failed: " + error.message, "error");
    }
    return;
  }

  // Update local state immediately (prevents revert on re-render)
  const i = _all.findIndex(w => w.id === id);
  if (i > -1) {
    _all[i].status       = status;
    _all[i].processed_at = new Date().toISOString();
  }

  filterRender();
  showToast(
    status === "approved"
      ? `✅ Withdrawal approved and marked as paid.`
      : `Withdrawal rejected.`,
    status === "approved" ? "success" : "info"
  );
}
</script>
</body>
</html>
